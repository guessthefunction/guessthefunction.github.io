<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guess the Function</title>
  <style>
    :root{
      --panel:#f7f7f8; --card:#fff; --border:#dadce0; --text:#202124; --muted:#6b7078;
      --accent:#2d70b3; --danger:#b3261e; --ok:#137333; --grid1:#f1f3f4; --grid2:#e2e5e9; --axis:#8a9099;
      --shadow:0 8px 20px rgba(60,64,67,.13); --unknown:#111;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:#fff}
    #app{display:grid;grid-template-columns:minmax(310px,360px) 1fr;width:100vw;height:100vh}
    aside{background:var(--panel);border-right:1px solid var(--border);padding:12px;overflow-y:auto}
    main{position:relative;min-width:0;min-height:0;background:white;touch-action:none}
    h1{margin:0 0 8px;font-size:1.22rem;line-height:1.2}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:10px}
    .topbar{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
    .timer{font-variant-numeric:tabular-nums;font-size:1.5rem;font-weight:730;letter-spacing:-.02em}
    button{border:1px solid var(--border);background:#fff;border-radius:9px;padding:7px 10px;color:var(--text);font:inherit;cursor:pointer;user-select:none}
    button:hover{background:#f3f5f7}button.primary{background:var(--accent);border-color:var(--accent);color:#fff}.small{padding:5px 8px;font-size:.86rem}
    label{display:block;margin:0 0 6px;color:#444851;font-size:.83rem;font-weight:700}
    input,textarea,select{width:100%;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font:16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;outline:none}
    input{padding:9px 10px}textarea{display:block;min-height:190px;resize:vertical;padding:11px 12px;line-height:1.55;white-space:pre-wrap}
    input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,112,179,.16)}select{padding:8px 9px;font:inherit}
    .status{min-height:18px;margin-top:6px;color:var(--muted);font-size:.82rem;line-height:1.35}.status.ok{color:var(--ok);font-weight:650}.status.bad{color:var(--danger)}.status.tiny{font-size:.76rem}
    .workspace-results{margin-top:8px;font:.82rem ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--muted);display:grid;gap:3px;max-height:120px;overflow:auto}.workspace-results b{color:var(--text);font-weight:650}
    .answer{display:none;margin-top:8px;padding:9px;border-radius:10px;background:#f5f7fb;border:1px solid #d8e1f2;font:.82rem/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap}.answer.show{display:block}
    .features-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.feature-list{display:grid;gap:7px;margin-top:8px;font-size:.81rem}.feature-title{color:#4b515b;font-weight:750;text-transform:lowercase}.feature-values{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;line-height:1.35}
    .database{color:var(--muted);font-size:.78rem;line-height:1.45}.database-group{margin-bottom:8px}.database-title{color:#444851;font-weight:750;margin-bottom:2px}.database-code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    #graph{display:block;width:100%;height:100%;background:#fff;cursor:crosshair;touch-action:none}#graph.dragging{cursor:grabbing}
    .toolbar{position:absolute;top:12px;right:12px;display:flex;gap:7px;padding:7px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.92);box-shadow:var(--shadow);backdrop-filter:blur(8px)}
    .readout{position:absolute;top:12px;left:12px;padding:7px 10px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.94);box-shadow:var(--shadow);font:13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre}
    .legend{position:absolute;left:12px;bottom:12px;display:grid;gap:5px;max-width:380px}.legend-row{display:grid;grid-template-columns:16px minmax(0,1fr);align-items:center;gap:7px;padding:5px 8px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.9);box-shadow:0 4px 12px rgba(60,64,67,.08);font-size:.82rem}.swatch{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.15)}.legend-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .trace-tooltip{position:absolute;display:none;pointer-events:none;z-index:10;max-width:330px;padding:7px 9px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.96);box-shadow:var(--shadow);font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre}
    @media(max-width:760px){#app{grid-template-columns:1fr;grid-template-rows:auto 1fr}aside{max-height:48vh;border-right:0;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
<div id="app">
  <aside>
    <h1>Guess the Function</h1>
    <section class="card topbar"><div class="timer" id="timer">00:00.0</div><div class="row"><button class="primary" id="newPuzzleBtn">New</button><button id="fitBtn">Fit</button></div></section>
    <section class="card"><label for="workspaceInput">Workspace</label><textarea id="workspaceInput" spellcheck="false" autocomplete="off"></textarea><div class="status" id="workspaceStatus"></div><div class="workspace-results" id="workspaceResults"></div></section>
    <section class="card"><label for="guessInput">Guess f(x)</label><input id="guessInput" spellcheck="false" autocomplete="off"><div class="row" style="margin-top:8px"><button class="primary" id="checkGuessBtn">Check</button><button id="revealBtn">Reveal</button></div><div class="status" id="guessStatus"></div><div class="answer" id="answerBox"></div></section>
    <section class="card"><div class="features-head"><label for="featureTarget" style="margin:0">Checks</label><button class="small" id="refreshFeaturesBtn">↻</button></div><select id="featureTarget"></select><div class="status tiny" id="featureStatus">current view</div><div class="feature-list" id="featureList"></div></section>
    <section class="card"><label>Database</label><div class="database" id="databaseText"></div></section>
  </aside>
  <main>
    <canvas id="graph"></canvas>
    <div class="toolbar"><button class="small" id="zoomInBtn">+</button><button class="small" id="zoomOutBtn">−</button><button class="small" id="homeBtn">Home</button><button class="small" id="resetBtn">Reset</button></div>
    <div class="readout" id="readout">x: 0, y: 0</div>
    <div class="legend" id="legend"></div>
    <div class="trace-tooltip" id="traceTooltip"></div>
  </main>
</div>
<script>
(function(){
  "use strict";

  window.addEventListener("error", function(e){
    var box=document.getElementById("workspaceStatus")||document.body;
    box.textContent="Script error: "+(e.message||e.error||"unknown");
    box.className="status bad";
  });

  var FUNCTION_DATABASE = [
    {id:"x",label:"x",kind:"identity",wrap:function(s){return s;},fn:function(x){return x;}},
    {id:"square",label:"x^2",kind:"power",wrap:function(s){return "("+s+")^2";},fn:function(x){return x*x;}},
    {id:"powself",label:"x^x",kind:"power",wrap:function(s){return "("+s+")^("+s+")";},fn:function(x){return safePow(x,x);}},
    {id:"plus1",label:"x+1",kind:"shift",wrap:function(s){return "("+s+"+1)";},fn:function(x){return x+1;}},
    {id:"recip",label:"1/x",kind:"rational",wrap:function(s){return "1/("+s+")";},fn:function(x){return Math.abs(x)>1e-10?1/x:NaN;}},
    {id:"exp",label:"e^x",kind:"exp",wrap:function(s){return "e^("+s+")";},fn:function(x){return safeExp(x);}},
    {id:"sin",label:"sin(x)",kind:"trig",wrap:function(s){return "sin("+s+")";},fn:function(x){return Math.sin(x);}},
    {id:"cos",label:"cos(x)",kind:"trig",wrap:function(s){return "cos("+s+")";},fn:function(x){return Math.cos(x);}},
    {id:"tan",label:"tan(x)",kind:"trig",wrap:function(s){return "tan("+s+")";},fn:function(x){return safeTan(x);}},
    {id:"ln",label:"ln(x)",kind:"log",wrap:function(s){return "ln("+s+")";},fn:function(x){return x>0?Math.log(x):NaN;}},
    {id:"abs",label:"abs(x)",kind:"absolute",wrap:function(s){return "abs("+s+")";},fn:function(x){return Math.abs(x);}},
    {id:"neg",label:"-x",kind:"linear",wrap:function(s){return "-("+s+")";},fn:function(x){return -x;}},
    {id:"asin",label:"arcsin(x)",kind:"invtrig",wrap:function(s){return "asin("+s+")";},fn:function(x){return x>=-1&&x<=1?Math.asin(x):NaN;}},
    {id:"acos",label:"arccos(x)",kind:"invtrig",wrap:function(s){return "acos("+s+")";},fn:function(x){return x>=-1&&x<=1?Math.acos(x):NaN;}},
    {id:"atan",label:"arctan(x)",kind:"invtrig",wrap:function(s){return "atan("+s+")";},fn:function(x){return Math.atan(x);}},
    {id:"sqrt",label:"sqrt(x)",kind:"root",wrap:function(s){return "sqrt("+s+")";},fn:function(x){return x>=0?Math.sqrt(x):NaN;}}
  ];

  var GRAPH_COLOURS=["#2d70b3","#c74440","#388c46","#6042a6","#fa7e19","#000000","#b03a9b","#008c8c"];
  var UNKNOWN_COLOUR="#111111";
  var MAX_WORKSPACE_GRAPHS=8;
  var canvas,ctx,timerEl,workspaceInput,workspaceStatus,workspaceResults,guessInput,guessStatus,answerBox,featureTarget,featureStatus,featureList,databaseText,legendEl,readoutEl,traceTooltip;
  var dpr=1, hidden=null, workspaceGraphs=[], workspaceItems=[], definitions={}, solved=false, startTime=0, solvedElapsed=0;
  var homeView={cx:0,cy:0,scale:12/900}, view={cx:0,cy:0,scale:12/900};
  var activePointers={}, activeCount=0, panStart=null, pinchStart=null, trace=null, featureTimer=null, timerId=null;

  function init(){
    canvas=document.getElementById("graph"); ctx=canvas.getContext("2d"); timerEl=document.getElementById("timer");
    workspaceInput=document.getElementById("workspaceInput"); workspaceStatus=document.getElementById("workspaceStatus"); workspaceResults=document.getElementById("workspaceResults");
    guessInput=document.getElementById("guessInput"); guessStatus=document.getElementById("guessStatus"); answerBox=document.getElementById("answerBox");
    featureTarget=document.getElementById("featureTarget"); featureStatus=document.getElementById("featureStatus"); featureList=document.getElementById("featureList"); databaseText=document.getElementById("databaseText");
    legendEl=document.getElementById("legend"); readoutEl=document.getElementById("readout"); traceTooltip=document.getElementById("traceTooltip");

    renderDatabaseHelp();
    document.getElementById("newPuzzleBtn").addEventListener("click",newPuzzle);
    document.getElementById("fitBtn").addEventListener("click",fitHidden);
    document.getElementById("homeBtn").addEventListener("click",function(){setView(homeView);});
    document.getElementById("resetBtn").addEventListener("click",function(){setView({cx:0,cy:0,scale:12/Math.max(720,canvasClientWidth())});});
    document.getElementById("zoomInBtn").addEventListener("click",function(){zoomAt(canvasClientWidth()/2,canvasClientHeight()/2,.78);});
    document.getElementById("zoomOutBtn").addEventListener("click",function(){zoomAt(canvasClientWidth()/2,canvasClientHeight()/2,1.28);});
    document.getElementById("checkGuessBtn").addEventListener("click",checkGuess);
    document.getElementById("revealBtn").addEventListener("click",revealAnswer);
    document.getElementById("refreshFeaturesBtn").addEventListener("click",updateFeatures);
    featureTarget.addEventListener("change",updateFeatures);
    workspaceInput.addEventListener("input",updateWorkspace);
    guessInput.addEventListener("keydown",function(e){if(e.key==="Enter")checkGuess();});
    window.addEventListener("resize",resizeCanvas);

    canvas.addEventListener("pointerdown",onPointerDown);
    canvas.addEventListener("pointermove",onPointerMove);
    canvas.addEventListener("pointerup",onPointerEnd);
    canvas.addEventListener("pointercancel",onPointerEnd);
    canvas.addEventListener("pointerleave",function(){if(activeCount===0)hideTrace();});
    canvas.addEventListener("wheel",onWheel,{passive:false});

    newPuzzle();
    setTimeout(resizeCanvas,0);
  }

  function newPuzzle(){
    hideTrace();
    for(var tries=0;tries<300;tries++){
      var p=makePuzzle();
      if(validatePuzzle(p)){hidden=p;break;}
    }
    if(!hidden) hidden=makePuzzle();
    workspaceInput.value=""; definitions={}; workspaceGraphs=[]; workspaceItems=[]; solved=false; solvedElapsed=0; startTime=performance.now();
    guessInput.value=""; guessStatus.textContent=""; guessStatus.className="status"; workspaceStatus.textContent=""; workspaceResults.innerHTML="";
    answerBox.textContent=""; answerBox.classList.remove("show");
    buildFeatureTarget(); fitHidden(false); updateWorkspace(); startTimer(); redraw(); updateFeatures();
  }

  function makePuzzle(){
    var count=Math.random()<.25?2:3, chosen=chooseComponents(count), comps=[];
    for(var i=0;i<chosen.length;i++) comps.push({name:String.fromCharCode(102+i),db:chosen[i]});
    var xnode={fn:function(x){return x;},expr:"x",code:"x"};
    function A(c,arg){return {fn:function(x){return cleanValue(c.db.fn(arg.fn(x)));},expr:c.db.wrap(arg.expr),code:c.name+"("+arg.code+")"};}
    function B(op,u,v){return {fn:function(x){var a=u.fn(x),b=v.fn(x); if(!Number.isFinite(a)||!Number.isFinite(b))return NaN; if(op==="+")return a+b; if(op==="-")return a-b; if(op==="*")return a*b; return Math.abs(b)>1e-10?a/b:NaN;},expr:"("+u.expr+op+v.expr+")",code:"("+u.code+op+v.code+")"};}
    var f=comps[0],g=comps[1],h=comps[2], patterns=[];
    if(count===2){
      patterns=[
        function(){return A(f,A(g,xnode));},
        function(){return B("+",A(f,xnode),A(g,xnode));},
        function(){return B("-",A(f,xnode),A(g,xnode));},
        function(){return B("*",A(f,xnode),A(g,xnode));},
        function(){return B("/",A(f,xnode),A(g,xnode));},
        function(){return A(f,B("+",A(g,xnode),xnode));},
        function(){return B("+",A(f,A(g,xnode)),xnode);}
      ];
    }else{
      patterns=[
        function(){return A(f,A(g,A(h,xnode)));},
        function(){return A(f,B("+",A(g,xnode),A(h,xnode)));},
        function(){return A(f,B("-",A(g,xnode),A(h,xnode)));},
        function(){return A(f,B("*",A(g,xnode),A(h,xnode)));},
        function(){return A(f,B("/",A(g,xnode),A(h,xnode)));},
        function(){return B("+",B("+",A(f,xnode),A(g,xnode)),A(h,xnode));},
        function(){return B("+",B("-",A(f,xnode),A(g,xnode)),A(h,xnode));},
        function(){return B("*",B("*",A(f,xnode),A(g,xnode)),A(h,xnode));},
        function(){return B("*",A(f,xnode),A(g,A(h,xnode)));},
        function(){return B("+",A(f,A(g,xnode)),A(h,xnode));},
        function(){return B("-",A(f,A(g,xnode)),A(h,xnode));},
        function(){return B("*",A(f,A(g,xnode)),A(h,xnode));},
        function(){return B("/",A(f,A(g,xnode)),A(h,xnode));},
        function(){return B("+",A(f,xnode),B("*",A(g,xnode),A(h,xnode)));},
        function(){return B("/",A(f,xnode),B("+",A(g,xnode),A(h,xnode)));}
      ];
    }
    var node=patterns[Math.floor(Math.random()*patterns.length)]();
    return {fn:node.fn, expr:node.expr, composition:"F(x) = "+node.code, components:comps};
  }

  function chooseComponents(count){
    var pool=shuffle(FUNCTION_DATABASE.slice()), out=[], hasTrig=false, hasInv=false;
    for(var i=0;i<pool.length && out.length<count;i++){
      var d=pool[i];
      if(out.some(function(e){return e.id===d.id;}))continue;
      if(d.kind==="trig"&&hasTrig)continue;
      if(d.kind==="invtrig"&&hasInv)continue;
      out.push(d); if(d.kind==="trig")hasTrig=true; if(d.kind==="invtrig")hasInv=true;
    }
    return out;
  }

  function validatePuzzle(p){
    var finite=0, ys=[], prev=null, variation=0;
    for(var i=0;i<=500;i++){
      var x=-10+20*i/500, y=cleanValue(p.fn(x));
      if(Number.isFinite(y)&&Math.abs(y)<1e5){finite++;ys.push(y); if(prev!==null)variation+=Math.abs(y-prev); prev=y;}
    }
    if(finite<45 || ys.length<45) return false;
    ys.sort(function(a,b){return a-b;});
    var spread=ys[Math.floor(ys.length*.9)]-ys[Math.floor(ys.length*.1)];
    return spread>1e-4 && variation>1e-3;
  }

  function startTimer(){
    if(timerId) clearInterval(timerId);
    timerId=setInterval(updateTimer,100); updateTimer();
  }
  function updateTimer(){timerEl.textContent=formatTime(solved?solvedElapsed:performance.now()-startTime);}
  function stopTimer(){if(!solved){solved=true; solvedElapsed=performance.now()-startTime;} updateTimer();}

  function updateWorkspace(){
    definitions={}; workspaceGraphs=[]; workspaceItems=[]; workspaceResults.innerHTML="";
    var lines=workspaceInput.value.split(/\n/), errors=[], results=[];
    for(var i=0;i<lines.length;i++){
      var raw=lines[i].trim(); if(!raw)continue;
      try{
        var item=parseWorkspaceLine(raw,i);
        if(!item)continue;
        workspaceItems.push(item);
        if(item.isDefinition) definitions[item.name]=item.compiled;
        if(item.usesVar && workspaceGraphs.length<MAX_WORKSPACE_GRAPHS){
          var colour=GRAPH_COLOURS[workspaceGraphs.length%GRAPH_COLOURS.length];
          workspaceGraphs.push({display:item.display,fn:item.fn,colour:colour,item:item});
        }else if(!item.usesVar){
          var val=cleanValue(item.fn(0));
          results.push("<b>"+escapeHtml(item.display)+"</b> = "+(Number.isFinite(val)?formatCoord(val):"undefined"));
        }
      }catch(e){errors.push("line "+(i+1)+": "+e.message);}
    }
    workspaceResults.innerHTML=results.slice(0,8).map(function(s){return "<div>"+s+"</div>";}).join("");
    if(errors.length&&workspaceGraphs.length===0) setStatus(workspaceStatus,errors[0],"bad");
    else if(errors.length) setStatus(workspaceStatus,workspaceGraphs.length+" graphed; "+errors.length+" ignored","bad");
    else if(workspaceGraphs.length||results.length) setStatus(workspaceStatus,workspaceGraphs.length+" graphed"+(results.length?", "+results.length+" value"+(results.length>1?"s":""):""),"");
    else setStatus(workspaceStatus,"","");
    checkWorkspaceSolved(); buildFeatureTarget(); redraw();
  }

  function parseWorkspaceLine(raw,lineIndex){
    var eq=findTopLevelEquals(raw), lhs=null, rhs=raw, name=null;
    if(eq>=0){ lhs=raw.slice(0,eq).trim(); rhs=raw.slice(eq+1).trim(); name=parseDefinitionName(lhs); if(!name)throw new Error("left side must be like g or g(x)"); }
    var compiled=parseExpression(rhs,{allowHidden:true,definitions:definitions,hiddenFn:hidden.fn});
    var display=name ? name+"(x) = "+rhs : raw;
    return {line:lineIndex+1,raw:raw,display:display,name:name,isDefinition:!!name,fn:compiled.fn,usesHidden:compiled.usesHidden,usesVar:compiled.usesVar,compiled:compiled};
  }

  function findTopLevelEquals(s){return s.indexOf("=");}
  function parseDefinitionName(lhs){
    var s=lhs.toLowerCase().replace(/\s+/g,"");
    var m=s.match(/^([a-z])(?:\((x|n)\))?$/);
    if(!m || m[1]==="x" || m[1]==="n" || m[1]==="f") return null;
    return m[1];
  }

  function checkWorkspaceSolved(){
    if(solved||!hidden||workspaceItems.length===0)return;
    var pure=[], hiddenBased=[];
    workspaceItems.forEach(function(it){if(!it.usesVar)return; if(it.usesHidden)hiddenBased.push(it); else pure.push(it);});
    for(var i=0;i<pure.length;i++){
      if(compareFunctions(hidden.fn,pure[i].fn).pass){markSolved("Solved from workspace: "+pure[i].display);return;}
    }
    for(var a=0;a<hiddenBased.length;a++)for(var b=0;b<pure.length;b++){
      if(compareFunctions(hiddenBased[a].fn,pure[b].fn,{domainLoose:true}).pass){markSolved("Solved: "+hiddenBased[a].display+" matches "+pure[b].display);return;}
    }
  }

  function checkGuess(){
    var text=guessInput.value.trim(); if(!text){setStatus(guessStatus,"enter a guess first","bad");return;}
    try{
      var compiled=parseExpression(text,{allowHidden:false,definitions:definitions,hiddenFn:hidden.fn});
      if(compiled.usesHidden){setStatus(guessStatus,"guess cannot use f(x) or hidden-based definitions","bad");return;}
      var result=compareFunctions(hidden.fn,compiled.fn);
      if(result.pass){markSolved("Correct. Max error "+result.maxError.toExponential(2)+".");}
      else setStatus(guessStatus,result.domainProblem?"Not quite. Domains differ.":"Not quite.","bad");
    }catch(e){setStatus(guessStatus,e.message,"bad");}
  }

  function markSolved(msg){stopTimer(); setStatus(guessStatus,msg+"  "+formatTime(solvedElapsed)+".","ok");}
  function revealAnswer(){stopTimer(); answerBox.textContent=hiddenAnswerText(); answerBox.classList.add("show"); setStatus(guessStatus,"Revealed. "+formatTime(solvedElapsed)+".","");}
  function hiddenAnswerText(){
    var parts=["Hidden F(x) = "+hidden.expr,"", "Generator functions:"];
    hidden.components.forEach(function(c){parts.push(c.name+"(x) = "+c.db.label);});
    parts.push("", "Composition:", hidden.composition);
    return parts.join("\n");
  }

  function compareFunctions(a,b,opts){
    opts=opts||{}; var xs=samplePoints(), checked=0, comparable=0, mismatched=0, maxErr=0;
    for(var i=0;i<xs.length;i++){
      var x=xs[i], y1=cleanValue(a(x)), y2=cleanValue(b(x)), f1=Number.isFinite(y1), f2=Number.isFinite(y2);
      if(f1&&f2){comparable++; var err=relativeError(y1,y2); if(err>maxErr)maxErr=err; if(err>2e-4)return {pass:false,maxError:maxErr,domainProblem:false}; checked++;}
      else if(f1!==f2)mismatched++;
    }
    var mismatchRate=comparable+mismatched?mismatched/(comparable+mismatched):1;
    return {pass:checked>=45 && maxErr<2e-4 && (opts.domainLoose || mismatchRate<.07),maxError:maxErr,checked:checked,domainProblem:mismatchRate>=.07};
  }
  function samplePoints(){
    var xs=[], ranges=[[-8,8],[-2,2],[.05,8],[-8,-.05],[-20,20]];
    ranges.forEach(function(r){for(var i=0;i<28;i++)xs.push(r[0]+(r[1]-r[0])*i/27);});
    for(var j=1;j<=80;j++){var t=fract(Math.sin(j*91.713+.37)*10000);xs.push(-10+20*t);} return xs;
  }

  function resizeCanvas(){
    var rect=canvas.getBoundingClientRect(); dpr=Math.max(1,window.devicePixelRatio||1);
    canvas.width=Math.max(1,Math.floor(rect.width*dpr)); canvas.height=Math.max(1,Math.floor(rect.height*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0); redraw();
  }
  function redraw(schedule){
